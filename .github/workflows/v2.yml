name: v2

on:
  push:
    branches: [master]
  pull_request:

jobs:
  calibration-and-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      # v2 が必要とする submodule のみ(全 recursive は v1 の資産で重い)
      - name: Init required submodules
        run: git submodule update --init third_party/enet third_party/kcp

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake

      - name: orchestrator vet + test
        run: |
          go vet ./orchestrator/...
          go test -count=1 ./orchestrator/...

      # 校正スイート(会計零点・既知故障注入を含む。sudo/netns 不要)
      - name: benchkit build + calibration tests
        run: |
          cmake -S benchkit -B build-v2
          cmake --build build-v2 -j
          ctest --test-dir build-v2 --output-on-failure

      - name: enet transport build + smoke
        run: |
          cmake -S servers/enet -B build-v2-enet
          cmake --build build-v2-enet -j
          ctest --test-dir build-v2-enet --output-on-failure

      - name: kcp transport build + smoke
        run: |
          cmake -S servers/kcp -B build-v2-kcp
          cmake --build build-v2-kcp -j
          ctest --test-dir build-v2-kcp -R kcp_loopback_smoke --output-on-failure

      - name: raw transport build + three-scenario no-loss smoke
        run: |
          cmake -S servers/raw_udp -B build-v2-rawudp
          cmake --build build-v2-rawudp -j
          ctest --test-dir build-v2-rawudp --output-on-failure
          go build -o build-v2/orchestrator ./orchestrator/cmd/orchestrator
          build-v2/orchestrator run -config orchestrator/examples/local-baseline-rawudp.json
          build-v2/orchestrator run -config orchestrator/examples/local-authoritative-rawudp.json
          build-v2/orchestrator run -config orchestrator/examples/local-room-relay-rawudp.json

      - name: managed solution build + scenario no-loss smoke
        run: |
          dotnet build -c Release -m:1 servers/litenetlib/LiteNetLibBench.sln
          dotnet build -c Release -m:1 servers/websocket/WebSocketBench.sln
          dotnet build -c Release -m:1 servers/magiconion/MagicOnionBench.sln
          dotnet run --no-build -c Release --project servers/magiconion/BenchKit.CS.Tests/BenchKit.CS.Tests.csproj
          python3 servers/litenetlib/smoke_test.py \
            servers/litenetlib/LiteNetLibBench.Server/bin/Release/net10.0/LiteNetLibBench.Server \
            servers/litenetlib/LiteNetLibBench.Client/bin/Release/net10.0/LiteNetLibBench.Client
          python3 servers/websocket/smoke_test.py \
            servers/websocket/WebSocketBench.Server/bin/Release/net10.0/WebSocketBench.Server \
            servers/websocket/WebSocketBench.Client/bin/Release/net10.0/WebSocketBench.Client
          python3 servers/magiconion/smoke_test.py \
            servers/magiconion/MagicOnionBench.Server/bin/Release/net10.0/MagicOnionBench.Server \
            servers/magiconion/MagicOnionBench.Client/bin/Release/net10.0/MagicOnionBench.Client

      # 校正: duration 不変性(loopback、netem なし)
      - name: calibration duration invariance
        run: ./calibration/duration_invariance.sh

      # 軽量 loopback ベンチ(共有 runner の診断値。SUT の FAIL/INVALID では
      # 落とさない — CI の合否は上の smoke が担う)。結果は artifact のみ
      - name: light bench (diagnostic)
        run: ./scripts/run-ci-bench.sh

      - name: upload bench results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-bench
          path: results-v2/ci-bench/
          retention-days: 30
          if-no-files-found: ignore

  native-solution-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        adapter: [gns, msquic]

    steps:
      - uses: actions/checkout@v4

      - name: Init adapter submodule
        run: git submodule update --init --recursive third_party/${{ matrix.adapter }}

      - name: Install native prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libnuma-dev libprotobuf-dev libssl-dev libsodium-dev protobuf-compiler

      - name: Build and run scenario no-loss smoke
        run: |
          cmake -S servers/${{ matrix.adapter }} -B build-v2-${{ matrix.adapter }} -DCMAKE_BUILD_TYPE=Release
          cmake --build build-v2-${{ matrix.adapter }} -j2
          ctest --test-dir build-v2-${{ matrix.adapter }} --output-on-failure
